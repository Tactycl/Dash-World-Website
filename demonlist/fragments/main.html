<link rel="stylesheet" href="./fragments/main.css">

<div id="items">
	<div id="itemsList">
		<div id="listTabs" class="separator">
			<button class="list-tab-button start" id="demonsTabButton" data-tab="demons">
				<span>Demons</span>
			</button>
			<button class="list-tab-button end" id="leaderboardTabButton" data-tab="leaderboard">
				<span>Leaderboard</span>
			</button>
		</div>

		<div class="list-view" id="demonsList" hidden></div>
		<div class="list-view" id="leaderboardList" hidden></div>
	</div>

	<div id="itemView">
		<div id="itemViewContainer">

		</div>
	</div>
</div>

<!-- LEADERBOARD -->

<template id="leaderboardEntryTemplate">
	<div class="list-entry">
		<div class="thumbnail-view">
			<img class="user-thumbnail">
		</div>
		<div class="desc-view">
			<h3 class="user-name-view">#<span class="user-rank"></span> - <span class="user-name"></span></h3>
			<p class="user-score-view"><span class="user-score-type"></span>: <span class="user-score"></span></p>
		</div>
	</div>
</template>

<template id="playerViewTemplate">
	<div id="playerViewMobileActions" class="view-mobile-actions">
		<button class="close-button"><img src="/img/close.svg"></button>
	</div>

	<div id="playerViewHeader" class="player-header separator">
		<div class="player-avatar-view">
			<img class="player-avatar">
		</div>
		<div class="player-desc-view">
			<h1 class="player-name"></h1>
			<p class="player-rank-view">Top #<span class="player-rank"></span> Player</p>
		</div>
	</div>

	<div id="playerViewContent" class="separator">
		<div class="info-grid">
			<div class="info-space">
				<p class="info-space-title separator">DEMONS RANK</p>
				<p class="info-space-value demons-rank"></p>
			</div>
		
			<div class="info-space">
				<p class="info-space-title separator">DEMONS SCORE</p>
				<p class="info-space-value demons-score"></p>
			</div>
		
			<div class="info-space">
				<p class="info-space-title separator">HARDEST DEMON</p>
				<p class="info-space-value hardest-demon"></p>
			</div>
		
			<div class="info-space">
				<p class="info-space-title separator">JOINED</p>
				<p class="info-space-value player-joined"></p>
			</div>
		</div>

		<div class="info-buttons">
			<a class="button-master" id="goToHardestDemon">
				<span>Go to Hardest Demon</span>
			</a>
		</div>
	</div>

	<div id="playerViewRecords">
		<div class="records-list-view">
			<h2 class="separator">Records</h2>
			<ul class="records-list">
				<!-- TODO -->
				<li>
					<span>Nothing to load</span>
				</li>
			</ul>
		</div>
	</div>
</template>

<!-- DEMONS -->
<template id="levelEntryTemplate">
	<div class="list-entry">
		<div class="thumbnail-view">
			<img class="level-thumbnail">
		</div>
		<div class="desc-view">
			<h3 class="level-name-view">#<span class="level-rank">1</span> - <span class="level-name"></span>
			</h3>
			<p class="level-publisher-view">By <span class="level-publisher"></span></p>
		</div>
		<div class="level-difficulty-view">
			<span class="level-difficulty"></span>
		</div>
	</div>
</template>

<template id="levelLegacyListItem">
	<div id="levelLegacyListSeparator" class="separator">
		<p>LEGACY LIST</p>
	</div>
</template>

<template id="levelViewTemplate">
	<div id="levelViewMobileActions" class="view-mobile-actions">
		<button class="close-button"><img src="/img/close.svg"></button>
	</div>

	<div id="levelViewHeader" class="separator">
		<div class="level-video-container">
			<iframe class="level-video"></iframe>
		</div>
		
		<div class="level-stats-container">
			<div class="level-front separator">
				<h2 class="level-title"></h2>
				<p class="level-contributors">by <span class="level-publisher"></span></p>
			</div>

			<div class="level-info-pills"></div>

			<div class="info-grid">
				<div class="info-space">
					<p class="info-space-title separator">CREATORS</p>
					<p class="info-space-value level-creators"></p>
				</div>

				<div class="info-space">
					<p class="info-space-title separator">VERIFIER</p>
					<p class="info-space-value level-verifier"></p>
				</div>

				<div class="info-space">
					<p class="info-space-title separator">UPLOAD DATE</p>
					<p class="info-space-value level-upload-date"></p>
				</div>

				<div class="info-space">
					<p class="info-space-title separator">SONG</p>
					<p class="info-space-value level-song"></p>
				</div>
			</div>

			<div class="info-buttons">
				<button class="button-master" id="copyLevelIdButton">
					<span>Copy Level ID</span>
				</button>

				<a href="#submit" class="button-master" id="submitRecordButton">
					<span>Submit Record</span>
				</a>
			</div>
		</div>
	</div>

	<div id="levelViewContent" class="separator">
		<div class="info-grid">
			<div class="info-space">
				<p class="info-space-title separator">DOWNLOADS</p>
				<p class="info-space-value level-downloads"></p>
			</div>
		
			<div class="info-space">
				<p class="info-space-title separator">LIKES</p>
				<p class="info-space-value level-likes"></p>
			</div>
		
			<div class="info-space">
				<p class="info-space-title separator">OBJECTS</p>
				<p class="info-space-value level-objects"></p>
			</div>
		
			<div class="info-space">
				<p class="info-space-title separator">COPY</p>
				<p class="info-space-value level-copy"></p>
			</div>

			<div class="info-space">
				<p class="info-space-title separator">LENGTH</p>
				<p class="info-space-value level-length"></p>
			</div>

			<div class="info-space">
				<p class="info-space-title separator">VERSION</p>
				<p class="info-space-value level-version"></p>
			</div>

			<div class="info-space">
				<p class="info-space-title separator">COPIED FROM</p>
				<p class="info-space-value level-copied-from"></p>
			</div>

			<div class="info-space">
				<p class="info-space-title separator">LDMS</p>
				<p class="info-space-value level-ldms"></p>
			</div>
		</div>
	</div>

	<div id="levelViewHistory" class="separator">
		<h2>Position History</h2>
		<p class="history-title table-title">This level's recorded position history</p>
	
		<div class="history-table level-table">
			<table>
				<thead class="separator">
					<th class="first">DATE</th>
					<th>NEW POSITION</th>
					<th class="last">REASON</th>
				</thead>
				<tbody></tbody>
			</table>

			<div class="level-table-load-more">
				<button class="button-master load-more-button">
					<span>Load More</span>
				</button>
			</div>
		</div>
	</div>

	<div id="levelViewRecords">
		<h2>Records</h2>
		<p class="records-title table-title">Record Submission Requirement: <span class="record-requirement"></span> | Verified Victors: <span class="verified-victors"></span> | Verified Records: <span class="verified-records"></span></p>
	
		<div class="records-table level-table">
			<table>
				<thead class="separator">
					<th class="first">USERNAME</th>
					<th>PERCENTAGE</th>
					<th class="last">VIDEO PROOF</th>
				</thead>
				<tbody></tbody>
			</table>

			<div class="level-table-load-more">
				<button class="button-master load-more-button">
					<span>Load More</span>
				</button>
			</div>
		</div>
	</div>
</template>

<template id="levelPositionHistoryItem">
	<tr class="separator">
		<td class="history-date first"></td>
		<td class="history-placement"></td>
		<td class="history-reason last"></td>
	</tr>
</template>

<template id="levelRecordItem">
	<tr class="record-entry separator">
		<td class="first">
			<div class="record-user">
				<img class="record-avatar">
				<p class="record-username">Tactycl</p>
			</div>
		</td>
		<td>
			<span class="record-percentage">100%</span>
		</td>
		<td class="last">
			<a class="record-proof-button button-secondary" target="_blank">
				<span>
					<img class="record-proof-origin" src="/img/youtube.svg"> <span>View Proof</span>
				</span>
			</a>
		</td>
	</tr>
</template>
