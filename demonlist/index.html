<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
				
		<meta name="description" content="This is the official demonlist of the roblox game 'Dash World'." />
		<meta name="author" content="Tacky">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
				
		<title>Dash World - Demonlist</title>
				
		<link rel="icon" type="image/x-icon" href="/img/icon.ico">
		<link rel="stylesheet" href="https://cdn.tarylem.com/css/fonts.css">
		<link rel="stylesheet" href="/global.css">
		<link rel="stylesheet" href="./style.css">

		<script src="helpers.js"></script>
		<script src="router.js"></script>
		<script src="cache.js"></script>
	</head>
	<body>
		<main id="app">
			<header id="header">
				<div class="inline-flex-container">
					<a href="./#demons" id="logo">
						<img src="/img/iconHighRes.png" alt="Dash World Logo">
						<span>Dash World Demonlist</span>
					</a>
					
					<div id="accountSettings" class="inline-flex-button-list">
						<button class="button-master" id="themeButton">
							<span><img src="/img/dark.svg" id="themeIcon"><span id="themeLabel"> Dark</span></span>
						</button>

						<a class="button-master" href="#login">
							<span><img src="/img/profile.svg"><span> My Account</span></span>
						</a>
					</div>
				</div>
			</header>

			<div id="content"></div>

			<footer id="footer">
				<div class="inline-flex-container">
					<div>
						<span>© </span>
						<span id="copyrightYear"></span>
						<a id="tarylemReference" target="_blank" href="https://www.tarylem.com"> Tarylem</a>
					</div>

					<div class="inline-flex-button-list">
						<a class="button-secondary" href="#terms">
							<span>Terms</span>
						</a>

						<a class="button-secondary" href="#privacy">
							<span>Privacy</span>
						</a>
					</div>
				</div>
			</footer>
		</main>
		
		<script src="theme.js"></script>
		<script src="index.js" type="module"></script>
	</body>
</html>
